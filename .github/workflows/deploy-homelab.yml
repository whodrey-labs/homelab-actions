name: Homelab Deploy

on:
  workflow_call:
    inputs:
      deploy_path:
        description: "Path on the homelab server where the project lives"
        required: true
        type: string

      compose_file:
        description: "Docker Compose file to use"
        required: false
        type: string
        default: compose.yml

      branch:
        description: "Git branch to pull on the server"
        required: false
        type: string
        default: main

      use_tailscale:
        description: "Whether to connect GitHub Actions to Tailscale before SSH"
        required: false
        type: boolean
        default: true

    secrets:
      HOMELAB_SSH_KEY:
        required: true
      HOMELAB_HOST:
        required: true
      HOMELAB_USER:
        required: true
      TAILSCALE_AUTHKEY:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        if: ${{ inputs.use_tailscale }}
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          script: |
            set -e

            DEPLOY_PATH="${{ inputs.deploy_path }}"
            BRANCH="${{ inputs.branch }}"
            COMPOSE_FILE="${{ inputs.compose_file }}"
            REPO_SSH="git@github.com:${{ github.repository }}.git"

            echo "Deploy path: $DEPLOY_PATH"
            echo "Repo: $REPO_SSH"
            echo "Branch: $BRANCH"

            mkdir -p "$(dirname "$DEPLOY_PATH")"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Project folder does not exist yet. Cloning..."
              git clone --branch "$BRANCH" "$REPO_SSH" "$DEPLOY_PATH"
            else
              echo "Project folder exists. Updating..."
              cd "$DEPLOY_PATH"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi

            cd "$DEPLOY_PATH"
            docker compose -f "$COMPOSE_FILE" up -d --build
