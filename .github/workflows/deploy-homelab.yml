on:
  workflow_call:
    inputs:
      deploy_path:
        required: true
        type: string

      compose_file:
        required: false
        type: string
        default: compose.prod.yml

      branch:
        required: false
        type: string
        default: main

      use_tailscale:
        required: false
        type: boolean
        default: true

    secrets:
      HOMELAB_HOST:
        required: true
      HOMELAB_USER:
        required: true
      HOMELAB_SSH_KEY:
        required: true
      TAILSCALE_AUTHKEY:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        if: ${{ inputs.use_tailscale }}
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via homelab pipeline
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          script: |
            set -e

            REPO_NAME="$(basename "${{ github.repository }}")"
            BRANCH="${{ inputs.branch }}"
            SITES_BASE="/home/${{ secrets.HOMELAB_USER }}/docker/sites"
            SITE_PATH="$SITES_BASE/$REPO_NAME"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            DEPLOY_SCRIPT="/home/${{ secrets.HOMELAB_USER }}/homelab-infra/scripts/deploy-site.sh"

            echo "Repo name: $REPO_NAME"
            echo "Site path: $SITE_PATH"
            echo "Repo URL: $REPO_URL"
            echo "Branch: $BRANCH"

            mkdir -p "$SITES_BASE"

            if [ ! -d "$SITE_PATH/.git" ]; then
              echo "Project folder does not exist yet. Cloning..."
              rm -rf "$SITE_PATH"
              git clone --branch "$BRANCH" "$REPO_URL" "$SITE_PATH"
            else
              echo "Project folder exists. Updating..."
              cd "$SITE_PATH"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi

            echo "Running homelab deploy pipeline..."
            bash "$DEPLOY_SCRIPT" "$SITE_PATH"
